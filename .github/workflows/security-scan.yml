name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mama

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: mama/go.sum

      - name: Verify module dependencies
        run: go mod verify

      - name: Check for stale/untracked module requirements
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mama

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: mama/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
