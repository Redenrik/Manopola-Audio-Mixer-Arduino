name: Bug report
description: Report a defect in firmware, host runtime, setup UI, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.
        Please include as much detail as possible so maintainers can reproduce quickly.
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Which subsystem is affected?
      placeholder: e.g. firmware/master, mama runtime, setup UI, docs
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include exact steps, serial payloads, or button/knob actions.
      placeholder: |
        1. Start `mama`
        2. Rotate knob 2 quickly clockwise
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste `event=` logs, config snippets, or screenshots from setup UI.
      render: shell
  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      options:
        - "Unknown"
        - "No"
        - "Yes"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release version or git commit tested.
      placeholder: v0.1.0 or 1a2b3c4
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Host OS, Go version (if building), board model, serial adapter, and audio stack.
      placeholder: |
        OS: Windows 11 / Ubuntu 24.04 / macOS 14
        Go: 1.24.x
        Hardware: 2x Arduino Nano (master+slave)
        Audio: PulseAudio / CoreAudio / Windows audio endpoint
    validations:
      required: true
